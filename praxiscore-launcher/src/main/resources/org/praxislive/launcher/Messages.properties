message.version=PraxisCORE version {0}

option.file.help=A script file or project folder to run.
option.port.help={auto | 0 .. 65535} : Launch a server on the specified port. \
    If 0 or auto, a port is automatically chosen. Unless --network is specified, \
    connections are only supported over local loopback. The port is reported to \
    standard out as "Listening at : [port]".
option.network.help={all | CIDR mask} : Launch a server that supports remote \
    connections, from all addresses or matching mask.  Implies --port auto if not \
    otherwise specified.
option.interactive.help=Allow for controlling the hub via PCL commands over the command line.
option.child.help=Configure the process to run as a child process. Implies --port auto \
    unless specified. A child process may not respond to normal termination signals, \
    instead relying on the parent process to be terminated.
option.environment.help=Output useful debugging information about process environment.
